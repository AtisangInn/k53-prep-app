<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled – K53 Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <link rel="stylesheet" href="assets/css/dark.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#c1272d' }, fontFamily: { sans: ['Lexend', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md p-8 text-center relative overflow-hidden">
    <!-- Cancel Icon -->
    <div class="w-20 h-20 bg-red-100 text-primary rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </div>

    <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Payment Cancelled</h1>
    <p class="text-gray-500 dark:text-gray-400 mb-8">
      Your payment was cancelled and your account has not been charged.
    </p>

    <div class="space-y-4">
      <button onclick="window.history.back()" class="block w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">
        Go Back and Try Again
      </button>
      <a href="index.html" class="block w-full bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-white py-3 rounded-xl font-bold hover:bg-gray-200 dark:hover:bg-gray-600 transition">
        Return to Home
      </a>
    </div>
  </div>

  <script src="assets/js/theme.js"></script>
</body>
</html>
