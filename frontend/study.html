<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>K53 Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com/3.4.1?plugins=forms"></script>
<link rel="stylesheet" href="assets/css/dark.css"/>
<script>
  tailwind.config = {
    theme: { extend: { colors: { primary: '#c1272d' }, fontFamily: { sans: ['Lexend','sans-serif'] }, borderRadius: { custom: '8px' } } }
  }
</script>
<style>
  body { background:#f9fafb; min-height:100vh; }
  .sidebar-h { height: 100vh; overflow-y: auto; position: sticky; top: 0; }
  .cat-btn { cursor:pointer; transition:all .15s; border-left: 3px solid transparent; }
  .cat-btn:hover { background:#f8faff; }
  .cat-btn.active { background:#f1f5f9; border-left-color:#c1272d; color:#c1272d; font-weight:600; }
  
  html { scroll-behavior: smooth; }
  
  @media (max-width: 1024px) {
    .sidebar-h { position: fixed; left: -100%; top: 0; z-index: 100; transition: left 0.3s ease; }
    .sidebar-open .sidebar-h { left: 0; }
  }
  
  /* Flashcard 3D Effects */
  .flashcard { perspective: 1000px; height: 500px; cursor:pointer; }
  .flashcard-inner { position: relative; width:100%; height:100%; transition: transform 0.6s; transform-style: preserve-3d; }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back { 
    position: absolute; width:100%; height:100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; 
    border-radius: 12px; background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    padding: 2rem; display: flex; flex-direction: column; overflow-y: auto;
  }
  .flashcard-back { transform: rotateY(180deg); background: #f8faff; border-color: #c1272d; }
  
  .scrollbar::-webkit-scrollbar { width:4px; }
  .scrollbar::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }
</style>
</head>
<body class="font-sans antialiased text-gray-900">

<!-- Sidebar -->
<div class="flex">
  <aside id="sidebar" class="w-64 sidebar-h bg-white dark:bg-gray-800 border-r border-slate-200 dark:border-gray-700 shrink-0 lg:block">
    <div class="p-6 border-b border-slate-200 dark:border-gray-700 flex items-center justify-between">
      <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo(0,0)">
        <div class="bg-primary p-2 rounded-custom">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white"><span class="school-name">K53</span></h1>
      </div>
      <button onclick="toggleSidebar(false)" class="lg:hidden text-slate-400 hover:text-slate-600">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    
    <nav class="flex-1 p-4 space-y-6 flex flex-col h-full">
      <div class="flex-1">
        <h2 class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 text-left">Navigation</h2>
        <div id="category-nav" class="space-y-1"></div>
      </div>

      <!-- Bottom Navigation Extras -->
      <div class="pt-6 border-t border-slate-100 flex flex-col gap-2">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2 text-slate-500 hover:text-primary hover:bg-red-50 rounded-lg transition-all text-sm font-medium">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Exit Study Hub
        </a>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-grow min-h-screen">
    <!-- Header/Desktop Subnav -->
    <header class="h-16 bg-white dark:bg-gray-800 border-b border-slate-200 dark:border-gray-700 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-40 transition-colors">
      <div class="flex items-center gap-2">
        <button onclick="toggleSidebar(true)" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-gray-700 rounded-lg">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span id="active-cat-label" class="hidden sm:inline-block text-xs font-bold text-primary uppercase tracking-widest">Study Hub Home</span>
      </div>
      <div class="flex items-center gap-2 sm:gap-4">
        <a id="back-btn" href="test.html" class="px-3 sm:px-4 py-2 bg-primary/10 text-primary rounded-lg text-xs sm:text-sm font-bold hover:bg-primary hover:text-white transition-all flex items-center gap-1 sm:gap-2 border border-primary/20">
          <span class="sm:inline">Take Mock Test</span><span class="inline sm:hidden">Mock Test</span> →
        </a>
        <button onclick="toggleTheme()" class="theme-toggle-btn" title="Toggle dark mode">
          <span class="theme-toggle-icon"></span>
        </button>
      </div>
    </header>

    <!-- Continuous Scroll Sections -->
    <div id="sections-wrapper" class="p-6 md:p-10 space-y-24">
      <div id="loading" class="text-center py-20 text-gray-400 font-medium">Loading Study Guide...</div>
      <!-- All sections will be injected here -->
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
const student = requireStudent();
if (!student) throw new Error('Not authenticated');

let allQuestions = [];
const cardIndices = { Rules: 0, Signs: 0, Controls: 0, Mix: 0 };
const categories = [
  { key: 'Welcome',  label: 'Study Hub Home',    icon: '🏠' },
  { key: 'Mix',      label: 'Study Mix',           icon: '🔀' },
  { key: 'Rules',    label: 'Rules of the Road',  icon: '📋' },
  { key: 'Signs',    label: 'Road Signs',          icon: '🚦' },
  { key: 'Controls', label: 'Vehicle Controls',    icon: '🚗' },
  { key: 'Handbook', label: 'Complete K53 Book', icon: '📖' },
];

async function init() {
  try {
    window.studentStatus = await apiFetch(`/payments/student/${student.id}/status`);
    if (window.studentStatus.secondsUntilRefresh) {
        startRefreshCountdown(window.studentStatus.secondsUntilRefresh);
    }
    allQuestions = await apiFetch('/questions');
    
    // Check for target question deep link
    const urlParams = new URLSearchParams(window.location.search);
    const qIdParam = urlParams.get('questionId');
    const catParam = urlParams.get('category');
    const fromParam = urlParams.get('from');
    
    if (fromParam === 'results') {
      const backBtn = document.getElementById('back-btn');
      if (backBtn) {
        backBtn.href = 'results.html';
        backBtn.textContent = '← Back to Results';
        backBtn.className = "text-sm font-medium text-gray-500 hover:text-primary transition-colors flex items-center gap-1";
      }
    }
    
    if (qIdParam) {
      const qId = parseInt(qIdParam);
      const targetQ = allQuestions.find(q => q.id === qId);
      if (targetQ) {
        const cat = targetQ.category;
        const catQuestions = allQuestions.filter(q => q.category === cat);
        const idx = catQuestions.findIndex(q => q.id === qId);
        if (idx !== -1) {
          cardIndices[cat] = idx;
        }
      }
    }

    renderNav();
    renderAllSections();
    
    // Smooth scroll to target
    if (qIdParam) {
      const qId = parseInt(qIdParam);
      const targetQ = allQuestions.find(q => q.id === qId);
      if (targetQ) {
        setTimeout(() => scrollToSection(targetQ.category), 500);
      }
    } else if (catParam) {
      setTimeout(() => scrollToSection(catParam), 500);
    }
    
    startObserving();
  } catch (e) {
    document.getElementById('loading').textContent = 'Failed to load: ' + e.message;
  }
}

function toggleSidebar(open) {
  const body = document.body;
  const sidebar = document.getElementById('sidebar');
  if (open) {
    body.classList.add('sidebar-open');
    let overlay = document.getElementById('sidebar-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'sidebar-overlay';
      overlay.className = 'fixed inset-0 bg-black/50 z-[90] lg:hidden';
      overlay.onclick = () => toggleSidebar(false);
      document.body.appendChild(overlay);
    }
  } else {
    body.classList.remove('sidebar-open');
    const overlay = document.getElementById('sidebar-overlay');
    if (overlay) overlay.remove();
  }
}

function renderNav() {
  const nav = document.getElementById('category-nav');
  nav.innerHTML = categories.map(c => `
    <div id="cat-${c.key}" onclick="scrollToSection('${c.key}')" 
      class="cat-btn flex items-center justify-between px-3 py-2 rounded-lg text-slate-600 text-sm">
      <div class="flex items-center gap-3">
        <span>${c.icon}</span>
        <span>${c.label}</span>
      </div>
    </div>
  `).join('');
}

function scrollToSection(key) {
  const el = document.getElementById(`section-${key}`);
  if (el) {
    const headerOffset = 80;
    const elementPosition = el.getBoundingClientRect().top;
    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

    window.scrollTo({
      top: offsetPosition,
      behavior: 'smooth'
    });
    
    updateActiveNav(key);
  }
}

function updateActiveNav(key) {
  document.getElementById('active-cat-label').textContent = categories.find(c => c.key === key)?.label || 'Study Hub';
  categories.forEach(c => {
    document.getElementById(`cat-${c.key}`)?.classList.toggle('active', c.key === key);
  });
}

function renderAllSections() {
  const wrapper = document.getElementById('sections-wrapper');
  document.getElementById('loading').classList.add('hidden');
  
  let html = '';
  
  // 1. Welcome Section
  html += `
    <section id="section-Welcome" class="scroll-mt-24 relative overflow-hidden min-h-[450px] flex items-center bg-slate-900 rounded-3xl mx-4 my-6 shadow-2xl">
      <div class="max-w-4xl mx-auto py-16 px-4 relative z-10 w-full">
        <div class="text-center mb-16">
          <div class="inline-block p-4 bg-white/10 rounded-full mb-6 text-4xl shadow-xl border border-white/10 backdrop-blur-md">🎓</div>
          <h1 class="text-4xl md:text-6xl font-black text-white tracking-tighter mb-4 drop-shadow-2xl">Welcome to Your Study Hub</h1>
          <p class="text-lg md:text-xl text-slate-300 max-w-2xl mx-auto leading-relaxed font-medium">Master your K53 Learner's License with our interactive tools designed for focused learning and effective retention.</p>
        </div>

        <div class="max-w-3xl mx-auto bg-white/5 dark:bg-white/5 backdrop-blur-md rounded-3xl border border-white/10 shadow-sm overflow-hidden flex flex-col lg:flex-row">
          <div class="flex-1 p-6 md:p-8 border-b lg:border-b-0 lg:border-r border-white/10 bg-white/5 text-left">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><span>🌱</span> Free Access</h2>
            <ul class="space-y-3 text-sm text-slate-300">
              <li class="flex items-start gap-2"><span class="text-green-400 mt-0.5">✓</span> <strong>30 Next Clicks:</strong> Preview current daily questions.</li>
              <li class="flex items-start gap-2"><span class="text-green-400 mt-0.5">✓</span> <strong>10 Card Flips:</strong> Reveal answers you're not sure of.</li>
              <li class="flex items-start gap-2"><span class="text-green-400 mt-0.5">✓</span> 2 Full Mock Exams</li>
              <li class="flex items-start gap-2"><span class="text-green-400 mt-0.5">✓</span> Basic Pass/Fail Test Results</li>
            </ul>
          </div>
          <div class="flex-1 p-6 md:p-8 bg-white/5 text-left relative">
            <h2 class="text-lg font-black text-primary mb-4 flex items-center gap-2"><span>🚀</span> Premium Access <span class="text-[10px] px-2 py-1 bg-red-100/20 text-red-100 rounded-full ml-auto whitespace-nowrap border border-red-500/30 font-bold uppercase tracking-wider">R79 / month</span></h2>
            <ul class="space-y-3 text-sm text-slate-300">
              <li class="flex items-start gap-2"><span class="text-primary mt-0.5">✦</span> <strong>Full Bank:</strong> 250+ Categorized Questions</li>
              <li class="flex items-start gap-2"><span class="text-primary mt-0.5">✦</span> Unlimited Study Flips</li>
              <li class="flex items-start gap-2"><span class="text-primary mt-0.5">✦</span> Full K53 Handbook Access</li>
              <li class="flex items-start gap-2"><span class="text-primary mt-0.5">✦</span> Detailed Correction Breakdowns</li>
              <li class="flex items-start gap-2"><span class="text-primary mt-0.5">✦</span> Unlimited Mock Exams</li>
            </ul>
            ${!window.studentStatus.isPremium ? `<button onclick="checkout()" class="mt-6 w-full py-3 bg-primary/20 hover:bg-primary text-primary hover:text-white font-bold rounded-lg transition-colors text-sm border border-primary/30 shadow-lg">Upgrade Now</button>` : `<div class="mt-6 pt-6 border-t border-white/10 text-sm font-bold text-green-400 flex items-center justify-center gap-2">✅ Premium Active</div>`}
          </div>
        </div>
      </div>
    </section>
  `;

  // 2. Flashcard Sections
  const flashcardCats = ['Mix', 'Rules', 'Signs', 'Controls'];
  flashcardCats.forEach(cat => {
    const isLockedCategory = !window.studentStatus.isPremium && cat !== 'Mix';
    
    html += `
      <section id="section-${cat}" class="scroll-mt-24 border-t border-slate-100 pt-16 relative">
        <div class="max-w-3xl mx-auto px-2">
          <div class="mb-10 text-center">
            <h2 class="text-3xl font-black text-slate-900 mb-2">${cat === 'Mix' ? 'Ultimate Study Mix' : cat === 'Rules' ? 'Rules of the Road' : cat === 'Signs' ? 'Road Signs' : 'Vehicle Controls'}</h2>
            <p class="text-slate-400 text-sm">${cat === 'Mix' ? 'Free 30 random flips per day!' : 'Tap and flip to master the ' + cat + ' section.'}</p>
          </div>
          
          <div class="relative">
            ${isLockedCategory ? `
              <div class="absolute inset-0 z-20 backdrop-blur-md bg-white/60 dark:bg-gray-900/80 flex flex-col items-center justify-center p-6 text-center rounded-3xl">
                <div class="w-16 h-16 bg-red-100 text-primary rounded-full flex items-center justify-center mb-4 text-3xl shadow-sm">🔒</div>
                <h3 class="text-2xl font-black mb-2 text-gray-900 dark:text-white">Premium Feature</h3>
                <p class="text-gray-600 dark:text-gray-300 mb-6 max-w-sm">Categorized learning is exclusive to Premium. You can still study for free using the randomized Study Mix above!</p>
                <button onclick="checkout()" class="px-8 py-3 bg-primary text-white font-bold rounded-xl hover:bg-red-700 transition shadow-lg">
                  Unlock Premium — R79
                </button>
              </div>
            ` : ''}
            <div id="container-${cat}" class="${isLockedCategory ? 'blur-sm pointer-events-none' : ''}"></div>
          </div>
        </div>
      </section>
    `;
  });


  // 3. Book Section
  html += `
    <section id="section-Handbook" class="scroll-mt-24 border-t border-slate-100 pt-16">
      <div class="max-w-5xl mx-auto px-2 pb-20">
        <div class="mb-10 text-center">
          <div class="inline-block p-4 bg-blue-100 text-blue-600 rounded-full mb-6 text-3xl">📖</div>
          <h2 class="text-3xl font-black text-slate-900 mb-2">Complete K53 Book</h2>
          <p class="text-slate-400 text-sm leading-relaxed max-w-lg mx-auto">Official study material optimized for this platform. Ready to read starting from the Table of Contents.</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-xl h-[80vh] overflow-hidden relative">
          ${!window.studentStatus.isPremium ? `
            <div class="absolute inset-0 z-10 backdrop-blur-md bg-white/60 dark:bg-gray-900/80 flex flex-col items-center justify-center p-6 text-center transition-colors">
              <div class="w-20 h-20 bg-red-100 text-primary rounded-full flex items-center justify-center mb-6 text-4xl shadow-sm">🔒</div>
              <h3 class="text-3xl font-black mb-3 text-gray-900 dark:text-white tracking-tight">Premium Exclusive</h3>
              <p class="text-gray-600 dark:text-gray-300 mb-8 max-w-md text-lg leading-relaxed">Unlock the complete K53 Handbook and get unlimited mock exams for 30 days.</p>
              <button id="handbook-checkout-btn" onclick="checkout()" class="px-10 py-4 bg-primary text-white font-bold rounded-xl hover:bg-red-700 transition shadow-xl hover:shadow-2xl hover:-translate-y-1 transform duration-200 text-lg">
                Unlock Premium — R79
              </button>
            </div>
          ` : ''}
          <iframe id="handbook-viewer" src="" class="w-full h-full border-0 ${!window.studentStatus.isPremium ? 'blur-sm pointer-events-none' : ''}"></iframe>
        </div>
      </div>
    </section>
  `;

  wrapper.innerHTML = html;
  
  // Set Handbook PDF src
  const viewer = document.getElementById('handbook-viewer');
  if (viewer) viewer.src = APP_CONFIG.handbookPath;
  
  // Initial card render for all
  flashcardCats.forEach(cat => renderSectionCard(cat));
}

function renderSectionCard(cat) {
  const container = document.getElementById(`container-${cat}`);
  let questions = [];
  
  if (cat === 'Mix') {
    if (!window.mixQuestions) {
        let mixed = [...allQuestions];
        // Fisher-Yates Shuffle
        for (let i = mixed.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [mixed[i], mixed[j]] = [mixed[j], mixed[i]];
        }
        window.mixQuestions = mixed;
    }
    questions = window.mixQuestions;
  } else {
    questions = allQuestions.filter(q => q.category === cat);
  }

  const idx = cardIndices[cat];
  const q = questions[idx];
  
  if (!q) {
    container.innerHTML = `<p class="text-center text-gray-400">No questions found.</p>`;
    return;
  }
  
  if (!window.viewedQuestionIds) window.viewedQuestionIds = new Set();
  window.viewedQuestionIds.add(q.id);

  container.innerHTML = `
    <div class="max-w-2xl mx-auto">
      <div id="flip-limit-banner" class="hidden mb-4 p-4 bg-red-50 border border-red-100 rounded-xl text-center">
        <p class="text-sm text-red-600 font-bold mb-1">Daily free limit reached!</p>
        <p class="text-xs text-red-500 mb-3 block">Come back in <span id="refresh-timer" class="font-mono font-bold tracking-wider text-sm">--:--:--</span> for fresh tries.</p>
        <button onclick="checkout()" class="px-4 py-2 bg-primary text-white text-sm font-bold rounded-lg shadow-sm hover:opacity-90 transition-opacity">Upgrade for Unlimited Access</button>
      </div>
      <div class="flashcard group mb-6" id="card-${q.id}" onclick="attemptFlip(this, ${q.id})">
        <div class="flashcard-inner">

          <div class="flashcard-front">
            <div class="flex items-center justify-between mb-4">
              <span class="text-xs font-bold text-primary uppercase tracking-widest">${q.subCategory}</span>
            </div>
            ${q.imageUrl ? `<div class="mb-6 flex justify-center bg-slate-50 p-4 rounded-xl border border-slate-100">
              <img src="${q.imageUrl.startsWith('http') ? q.imageUrl : 'assets/' + q.imageUrl}" class="max-h-32 object-contain" alt="Sign"/>
            </div>` : ''}
            <h3 class="text-xl font-bold text-slate-800 leading-tight mb-6">${q.text}</h3>
            <div class="space-y-3 mt-auto">
              ${['A','B','C'].map(opt => `
                <div class="flex items-center p-3.5 border border-slate-100 rounded-xl bg-slate-50/50 text-sm">
                  <span class="w-7 h-7 flex items-center justify-center bg-white border border-slate-200 rounded-lg font-bold text-primary mr-3 shrink-0">${opt}</span>
                  <span class="text-slate-600">${q['option'+opt]}</span>
                </div>
              `).join('')}
            </div>
            <div class="text-center mt-6">
              <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Tap to flip card</span>
            </div>
          </div>
          <div class="flashcard-back">
            <div class="text-center">
              <div class="inline-block px-4 py-1.5 bg-green-100 text-green-700 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 border border-green-200">Correct Answer</div>
              <h4 class="text-sm font-bold text-slate-400 uppercase mb-2">Option ${q.correctOption} is correct</h4>
              <p class="text-lg font-extrabold text-slate-900 leading-tight mb-8">${q['option'+q.correctOption]}</p>
              
              <div class="p-5 bg-white border border-slate-100 rounded-2xl text-left shadow-sm">
                <span class="text-[10px] font-bold text-primary uppercase tracking-widest mb-2 block">Why is this correct?</span>
                <p class="text-sm text-slate-600 leading-relaxed">${q.explanation || 'Study this concept in the K53 Handbook for more details.'}</p>
              </div>
            </div>
            <div class="text-center mt-auto pt-6">
              <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Tap to see question</span>
            </div>
          </div>
        </div>
      </div>
      <div class="flex items-center justify-between gap-4">
        <button onclick="changeCard('${cat}', -1)" class="px-6 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition-colors shadow-sm shrink-0">← Prev</button>
        <div class="flex-grow">
           <div class="w-full bg-slate-100 dark:bg-gray-700 h-1.5 rounded-full overflow-hidden mx-auto">
             <div class="h-full bg-primary" style="width: ${((idx + 1) / questions.length) * 100}%"></div>
           </div>
        </div>
        <button onclick="changeCard('${cat}', 1)" class="px-6 py-3 bg-primary text-white rounded-xl text-sm font-bold hover:opacity-90 transition-opacity shadow-lg shadow-primary/20 shrink-0">Next →</button>
      </div>
    </div>
  `;
}

let isChanging = false;
async function changeCard(cat, dir) {
  if (isChanging) return;
  isChanging = true;
  
  try {
      const questions = cat === 'Mix' ? window.mixQuestions : allQuestions.filter(q => q.category === cat);
      let nextIdx = cardIndices[cat] + dir;
      if (nextIdx < 0) nextIdx = questions.length - 1;
      if (nextIdx >= questions.length) nextIdx = 0;
      
      const targetQ = questions[nextIdx];
      
      if (!window.viewedQuestionIds) window.viewedQuestionIds = new Set();
      
      // Only consume backend limit if viewing a NEW question ID
      if (!window.studentStatus.isPremium && !window.viewedQuestionIds.has(targetQ.id)) {
          const nextRes = await requestCardNext(student.id);
          if (nextRes.secondsUntilRefresh) startRefreshCountdown(nextRes.secondsUntilRefresh);

          if (!nextRes.allowed) {
              const banner = document.getElementById('flip-limit-banner');
              banner.classList.remove('hidden');
              banner.innerHTML = `
                <p class="text-sm text-red-600 font-bold mb-1">Daily free limit reached!</p>
                <p class="text-xs text-red-500 mb-2 block">Come back in <span id="refresh-timer" class="font-mono font-bold tracking-wider">--:--:--</span></p>
                <p class="text-[10px] text-red-400 mb-3 block">You can still go back and flip already seen cards if you have flips left.</p>
                <button onclick="checkout()" class="px-4 py-2 bg-primary text-white text-sm font-bold rounded-lg shadow-sm">Upgrade for Unlimited Access</button>
              `;
              isChanging = false;
              return;
          }
          window.viewedQuestionIds.add(targetQ.id);
      }
      
      cardIndices[cat] = nextIdx;
      renderSectionCard(cat);
  } catch(e) {
      console.error(e);
  }
  isChanging = false;
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const key = entry.target.id.replace('section-', '');
      updateActiveNav(key);
    }
  });
}, { threshold: 0.2, rootMargin: '-100px 0px -50% 0px' });

let refreshInterval;
function startRefreshCountdown(seconds) {
    if (refreshInterval) clearInterval(refreshInterval);
    let remaining = seconds;
    
    function updateDisplay() {
        const timerEl = document.getElementById('refresh-timer');
        if (!timerEl) return;
        
        if (remaining <= 0) {
            timerEl.textContent = "00:00:00";
            location.reload(); // Refresh to get new limits
            return;
        }
        
        const h = Math.floor(remaining / 3600);
        const m = Math.floor((remaining % 3600) / 60);
        const s = Math.floor(remaining % 60);
        
        timerEl.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        remaining--;
    }
    
    updateDisplay();
    refreshInterval = setInterval(updateDisplay, 1000);
}

let isFlipping = false;
async function attemptFlip(el, questionId) {
    if (isFlipping) return;
    
    // If it's already flipped (student is turning it back over), no need to charge a flip limit
    if (el.classList.contains('flipped')) {
        el.classList.remove('flipped');
        return;
    }

    isFlipping = true;
    try {
        const flipRes = await requestCardFlip(student.id);
        if (flipRes.secondsUntilRefresh) startRefreshCountdown(flipRes.secondsUntilRefresh);

        if (!flipRes.allowed) {
            document.getElementById('flip-limit-banner').classList.remove('hidden');
            el.classList.add('animate-pulse');
            setTimeout(() => el.classList.remove('animate-pulse'), 1000);
            isFlipping = false;
            return;
        }

        // Allowed
        el.classList.add('flipped');
        trackActivity('flip');
        
        // Show remaining toast if free
        if (flipRes.remaining !== -1 && flipRes.remaining % 5 === 0 && flipRes.remaining > 0) {
            // Optional: alert remaining cards
            console.log(flipRes.remaining + " free flips remaining today.");
        }
    } catch (e) {
        console.error("Flip check failed automatically allowing flip", e);
        el.classList.add('flipped');
    }
    isFlipping = false;
}

let studyStartTime = Date.now();
async function trackActivity(type, amount = 1) {
    const studentId = student?.id;
    if (!studentId) return;

    const body = type === 'flip' 
        ? { flippedIncrement: amount, studySecondsIncrement: 0 }
        : { flippedIncrement: 0, studySecondsIncrement: amount };

    try {
        await apiFetch(`/students/${studentId}/activity`, {
            method: 'POST',
            body: JSON.stringify(body)
        });
    } catch (e) {
        console.error('Failed to track activity:', e);
    }
}

// Track study time every 30 seconds
setInterval(() => {
    trackActivity('time', 30);
}, 30000);

async function checkout() {
  try {
    const btn = document.getElementById('handbook-checkout-btn');
    if (btn) { btn.textContent = 'Redirecting to PayFast...'; btn.disabled = true; }

    const data = await PaymentService.createCheckout(student.id);
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = data.url;
    for (const field of data.fields) {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = field.name;
      input.value = field.value;
      form.appendChild(input);
    }
    document.body.appendChild(form);
    form.submit();
  } catch (e) {
    alert('Checkout failed: ' + e.message);
    window.location.reload();
  }
}
